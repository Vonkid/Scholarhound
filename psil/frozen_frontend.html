<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ScholarHound - Trajectory Map</title>
<style>
:root {
  --slate-50: #f8fafc;
  --slate-100: #f1f5f9;
  --slate-200: #e2e8f0;
  --slate-300: #cbd5e1;
  --slate-400: #94a3b8;
  --slate-500: #64748b;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1e293b;
  --slate-900: #0f172a;
  --amber-50: #fffbeb;
  --amber-100: #fef3c7;
  --amber-500: #f59e0b;
  --amber-600: #d97706;
  --amber-700: #b45309;
  --red-50: #fef2f2;
  --red-100: #fee2e2;
  --red-600: #dc2626;
  --orange-50: #fff7ed;
  --orange-100: #ffedd5;
  --orange-600: #ea580c;
  --yellow-50: #fefce8;
  --yellow-100: #fef9c3;
  --yellow-600: #ca8a04;
  --blue-50: #eff6ff;
  --blue-100: #dbeafe;
  --blue-600: #2563eb;
  --green-50: #ecfdf5;
  --green-100: #dcfce7;
  --green-700: #15803d;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--slate-50);
  color: var(--slate-800);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
.hidden { display: none !important; }
.nav-shell {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255,255,255,.96);
  border-bottom: 1px solid var(--slate-200);
  backdrop-filter: blur(10px);
}
.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 0 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 210px;
}
.brand-icon { font-size: 24px; line-height: 1; }
.brand-text {
  font-size: 20px;
  line-height: 1;
  font-weight: 800;
  color: var(--amber-700);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  overflow-x: auto;
  max-width: 100%;
}
.nav-btn {
  border: 1px solid transparent;
  border-radius: 10px;
  min-height: 38px;
  padding: 8px 12px;
  background: transparent;
  color: var(--slate-600);
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
}
.nav-btn:hover { background: var(--slate-100); }
.nav-btn.active {
  background: var(--amber-50);
  color: var(--amber-700);
}
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 16px 48px;
}
.card {
  background: #fff;
  border: 1px solid var(--slate-200);
  border-radius: 12px;
  transition: box-shadow .2s, border-color .2s, transform .2s;
}
.card:hover { box-shadow: 0 12px 40px rgba(15,23,42,.08); }
.grid { display: grid; gap: 16px; }
.stats-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); margin-bottom: 16px; }
.concept-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.two-grid { grid-template-columns: minmax(0, 1fr) minmax(320px, .55fr); }
.stat-card {
  padding: 20px;
  min-height: 106px;
}
.stat-value {
  margin: 0;
  font-size: 32px;
  line-height: 1;
  color: var(--slate-900);
  font-weight: 800;
}
.stat-label {
  margin: 8px 0 0;
  color: var(--slate-400);
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: .04em;
}
.stat-note {
  margin: 9px 0 0;
  color: var(--slate-500);
  font-size: 13px;
}
.section-title {
  margin: 0 0 16px;
  color: var(--slate-800);
  font-size: 18px;
  font-weight: 700;
}
.process-row { margin: 0 0 32px; }
.process-card {
  display: grid;
  grid-template-columns: minmax(0, .72fr) minmax(280px, .28fr);
  gap: 16px;
  padding: 16px;
}
.process-title {
  margin: 0;
  color: var(--slate-800);
  font-weight: 700;
}
.process-meta {
  margin-top: 7px;
  color: var(--slate-500);
  font-size: 13px;
  line-height: 1.45;
}
.process-badges {
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 24px;
  border-radius: 999px;
  border: 1px solid var(--slate-200);
  padding: 3px 9px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-green { color: var(--green-700); background: var(--green-50); border-color: var(--green-100); }
.badge-red { color: var(--red-600); background: var(--red-50); border-color: var(--red-100); }
.badge-blue { color: var(--blue-600); background: var(--blue-50); border-color: var(--blue-100); }
.badge-amber { color: var(--amber-700); background: var(--amber-50); border-color: var(--amber-100); }
.badge-slate { color: var(--slate-600); background: var(--slate-50); border-color: var(--slate-200); }
.tier-HIGH-PRIORITY { border-left: 4px solid var(--red-600); }
.tier-IMPORTANT { border-left: 4px solid var(--orange-600); }
.tier-POTENTIAL { border-left: 4px solid var(--yellow-600); }
.tier-WATCHLIST { border-left: 4px solid var(--blue-600); }
.paper-card {
  padding: 18px 20px;
  margin-bottom: 12px;
}
.paper-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.paper-title {
  margin: 10px 0 0;
  color: var(--slate-800);
  font-weight: 700;
  line-height: 1.35;
}
.paper-meta {
  margin-top: 5px;
  color: var(--slate-400);
  font-size: 13px;
}
.paper-score {
  color: var(--slate-800);
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
}
.muted { color: var(--slate-400); }
.concept-card { padding: 18px; min-height: 110px; }
.concept-name { color: var(--slate-800); font-weight: 700; }
.concept-meta { margin-top: 8px; color: var(--slate-400); font-size: 13px; }
.tier-menu { margin-bottom: 32px; }
.tier-menu-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.tier-menu-list { display: grid; gap: 8px; }
.tier-menu-item {
  padding: 13px;
  border-radius: 10px;
  border: 1px solid var(--slate-100);
  background: var(--slate-50);
}
.digest-toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.digest-toolbar input, .digest-toolbar select {
  border: 1px solid var(--slate-300);
  border-radius: 10px;
  min-height: 40px;
  padding: 8px 11px;
  color: var(--slate-700);
  background: #fff;
}
.trajectory-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
}
.trajectory-switcher {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.trajectory-switch {
  border: 1px solid var(--slate-200);
  background: #fff;
  color: var(--slate-600);
  border-radius: 10px;
  min-height: 66px;
  padding: 10px 12px;
  text-align: left;
  font-size: 12px;
}
.trajectory-switch.active {
  background: var(--slate-900);
  color: #fff;
  border-color: var(--slate-900);
}
.trajectory-stage {
  min-height: 560px;
  overflow: hidden;
}
.trajectory-loading {
  min-height: 560px;
  display: grid;
  place-items: center;
  padding: 28px;
}
.trajectory-loading-inner {
  width: min(520px, 100%);
  display: grid;
  gap: 14px;
}
.trajectory-loading-line,
.trajectory-loading-node {
  border-radius: 8px;
  background: linear-gradient(90deg, rgba(101,240,223,.08), rgba(216,182,111,.14), rgba(101,240,223,.08));
  background-size: 220% 100%;
  animation: trajectoryLoading 1.4s ease-in-out infinite;
}
.trajectory-loading-line {
  height: 12px;
}
.trajectory-loading-line.short {
  width: 62%;
}
.trajectory-loading-nodes {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.trajectory-loading-node {
  min-height: 84px;
  border: 1px solid rgba(101,240,223,.12);
}
.trajectory-svg {
  display: block;
  width: 100%;
  min-height: 560px;
}
.trajectory-link {
  stroke-dasharray: 6 10;
  animation: trajectoryFlow 12s linear infinite;
}
.trajectory-link-active {
  stroke-dasharray: 10 9;
  animation: trajectoryFlow 4.8s linear infinite;
}
.trajectory-node {
  transition: filter .2s ease;
}
.trajectory-node:hover {
  filter: drop-shadow(0 10px 18px rgba(15,23,42,.16));
}
.trajectory-selected-ring {
  fill: none;
  stroke-width: 2;
  opacity: .55;
  animation: trajectoryPulse 2.4s ease-out infinite;
}
.trajectory-label-card {
  height: 100%;
  padding: 10px 11px;
  border: 1px solid var(--slate-200);
  border-radius: 10px;
  background: rgba(255,255,255,.94);
  box-shadow: 0 10px 28px rgba(15,23,42,.08);
  overflow: hidden;
}
.trajectory-label-type {
  color: var(--slate-500);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.trajectory-label-title {
  margin-top: 4px;
  color: var(--slate-900);
  font-size: 12px;
  line-height: 1.22;
  font-weight: 750;
}
.trajectory-label-meta {
  margin-top: 5px;
  color: var(--slate-400);
  font-size: 10px;
}
.trajectory-panel { margin-top: 20px; }
.trajectory-node-card { padding: 18px; margin-bottom: 12px; }
.empty {
  padding: 24px;
  color: var(--slate-400);
  border: 1px dashed var(--slate-300);
  border-radius: 12px;
  background: #fff;
}
.modal {
  position: fixed;
  inset: 0;
  z-index: 80;
  display: none;
  overflow-y: auto;
  padding: 40px 16px;
  background: rgba(15,23,42,.5);
}
.modal.open { display: block; }
.modal-card {
  position: relative;
  max-width: 800px;
  margin: 0 auto;
  padding: 28px;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 24px 70px rgba(15,23,42,.22);
}
.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 34px;
  height: 34px;
  border: 0;
  background: transparent;
  color: var(--slate-400);
  font-size: 26px;
  line-height: 1;
}
.score-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin: 20px 0;
}
.score-cell {
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  background: var(--slate-50);
}
.score-num { font-size: 24px; font-weight: 800; color: var(--slate-900); }
.score-label { margin-top: 4px; color: var(--slate-400); font-size: 11px; }
.toc-card, .workflow-card, .bullet-block {
  margin: 18px 0;
  border: 1px solid var(--slate-200);
  border-radius: 12px;
  background: #fff;
  padding: 16px;
}
.toc-card {
  border-color: var(--green-100);
  background: #fbfffd;
}
.toc-image {
  display: block;
  width: 100%;
  max-height: 420px;
  object-fit: contain;
  border: 1px solid var(--slate-100);
  border-radius: 10px;
  background: var(--slate-50);
}
.workflow-card {
  border-color: var(--blue-100);
}
.workflow-steps {
  display: grid;
  gap: 12px;
}
.workflow-step {
  display: grid;
  grid-template-columns: 26px minmax(0, 1fr);
  gap: 10px;
}
.workflow-index {
  width: 24px;
  height: 24px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: var(--blue-600);
  color: #fff;
  font-size: 12px;
  font-weight: 800;
}
.workflow-label {
  color: var(--slate-400);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
}
.workflow-text {
  margin-top: 2px;
  color: var(--slate-700);
  font-size: 14px;
  line-height: 1.5;
}
.bullet-block {
  background: var(--slate-50);
}
.bullet-block.weakness {
  background: var(--orange-50);
  border-color: var(--orange-100);
}
.bullet-title {
  margin: 0 0 10px;
  color: var(--slate-700);
  font-weight: 800;
}
.bullet-list {
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 8px;
}
.bullet-list li {
  display: flex;
  gap: 9px;
  color: var(--slate-600);
  font-size: 14px;
  line-height: 1.55;
}
.bullet-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  margin-top: 8px;
  flex: 0 0 auto;
  background: var(--slate-400);
}
.weakness .bullet-dot {
  background: var(--orange-600);
}
@keyframes trajectoryFlow { to { stroke-dashoffset: -96; } }
@keyframes trajectoryLoading {
  0% { background-position: 120% 0; opacity: .58; }
  50% { opacity: .95; }
  100% { background-position: -120% 0; opacity: .58; }
}
@keyframes trajectoryPulse {
  0% { r: 24; opacity: .5; }
  70% { r: 36; opacity: 0; }
  100% { r: 36; opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .trajectory-link, .trajectory-link-active, .trajectory-selected-ring, .trajectory-loading-line, .trajectory-loading-node { animation: none !important; }
}
@media (max-width: 980px) {
  .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .concept-grid, .two-grid, .process-card { grid-template-columns: 1fr; }
  .process-badges { justify-content: flex-start; }
  .trajectory-switcher { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 680px) {
  .nav-inner { align-items: flex-start; flex-direction: column; padding: 12px 14px; }
  .brand { min-width: 0; }
  .nav-links { width: 100%; }
  main { padding: 24px 14px 40px; }
  .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .stat-card { padding: 16px; }
  .stat-value { font-size: 28px; }
  .digest-toolbar, .trajectory-header { align-items: flex-start; flex-direction: column; }
  .score-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

/* DESIGN.md-inspired dark operations skin */
:root {
  --ops-canvas: #030706;
  --ops-canvas-2: #071211;
  --ops-surface: rgba(12, 30, 29, .74);
  --ops-surface-strong: rgba(16, 42, 40, .9);
  --ops-surface-soft: rgba(18, 47, 44, .52);
  --ops-line: rgba(107, 150, 140, .26);
  --ops-line-strong: rgba(216, 182, 111, .55);
  --ops-teal: #65f0df;
  --ops-teal-soft: #38c6bd;
  --ops-amber: #d8b66f;
  --ops-amber-soft: #f1d08a;
  --ops-wine: #7a303a;
  --ops-ink: #f2f7f5;
  --ops-body: #b8c9c5;
  --ops-muted: #748985;
  --slate-50: #081311;
  --slate-100: #102220;
  --slate-200: #1e3a36;
  --slate-300: #325953;
  --slate-400: #78918d;
  --slate-500: #9fb2ae;
  --slate-600: #c3d0cd;
  --slate-700: #dce7e4;
  --slate-800: #eef5f2;
  --slate-900: #ffffff;
  --amber-50: rgba(216, 182, 111, .13);
  --amber-100: rgba(216, 182, 111, .28);
  --amber-500: #d8b66f;
  --amber-600: #e8c77f;
  --amber-700: #f2d695;
  --red-50: rgba(122, 48, 58, .28);
  --red-100: rgba(173, 72, 82, .36);
  --red-600: #d66a72;
  --orange-50: rgba(216, 128, 75, .16);
  --orange-100: rgba(216, 128, 75, .3);
  --orange-600: #d89054;
  --yellow-50: rgba(216, 182, 111, .13);
  --yellow-100: rgba(216, 182, 111, .28);
  --yellow-600: #d8b66f;
  --blue-50: rgba(101, 240, 223, .11);
  --blue-100: rgba(101, 240, 223, .24);
  --blue-600: #65f0df;
  --green-50: rgba(93, 210, 169, .12);
  --green-100: rgba(93, 210, 169, .24);
  --green-700: #74e0bf;
}
* { letter-spacing: 0 !important; }
body {
  background:
    linear-gradient(90deg, #000 0%, var(--ops-canvas) 18%, #071513 52%, #020403 100%);
  color: var(--ops-ink);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(115deg, transparent 0 31%, rgba(68, 150, 140, .13) 48%, transparent 72%),
    repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 78px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 78px);
  opacity: .42;
  mix-blend-mode: screen;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(90deg, rgba(0,0,0,.72), transparent 16%, transparent 82%, rgba(0,0,0,.68));
}
button, input, select { color-scheme: dark; }
.nav-shell {
  background: linear-gradient(180deg, rgba(2,7,6,.94), rgba(2,7,6,.62));
  border-bottom: 1px solid rgba(216, 182, 111, .13);
  box-shadow: 0 1px 0 rgba(101,240,223,.06), 0 18px 50px rgba(0,0,0,.28);
}
.nav-inner {
  max-width: 1560px;
  min-height: 70px;
  padding: 0 22px;
}
.brand {
  min-width: 260px;
}
.brand-icon {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(216,182,111,.34);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(216,182,111,.13), rgba(6,16,15,.7));
  box-shadow: 0 0 24px rgba(216,182,111,.12) inset;
}
.brand-text {
  color: var(--ops-amber-soft);
  font-size: 17px;
  font-weight: 700;
}
.brand::after {
  content: "Research OS";
  color: var(--ops-body);
  font-size: 12px;
  margin-left: -4px;
}
.nav-links {
  gap: 8px;
}
.nav-btn {
  min-height: 40px;
  padding: 9px 14px;
  border-radius: 8px;
  border-color: rgba(101,240,223,.17);
  background: linear-gradient(180deg, rgba(24,76,76,.5), rgba(8,23,23,.82));
  color: var(--ops-body);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 10px 24px rgba(0,0,0,.26);
}
.nav-btn:hover {
  background: linear-gradient(180deg, rgba(35,103,99,.66), rgba(12,33,32,.9));
  color: var(--ops-ink);
}
.nav-btn.active {
  color: var(--ops-amber-soft);
  border-color: rgba(216,182,111,.5);
  background: linear-gradient(180deg, rgba(216,182,111,.16), rgba(11,31,30,.9));
}
main {
  position: relative;
  z-index: 1;
  max-width: 1560px;
  padding: 28px 22px 56px;
}
.card {
  background: linear-gradient(180deg, rgba(18, 43, 41, .82), rgba(8, 20, 19, .9));
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.035), 0 22px 70px rgba(0,0,0,.24);
}
.card:hover {
  border-color: rgba(101, 240, 223, .33);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 0 28px rgba(101,240,223,.06);
}
.section-title {
  color: var(--ops-ink);
  font-weight: 650;
}
.stat-card {
  min-height: 112px;
  padding: 18px;
}
.stat-value {
  color: var(--ops-ink);
  font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 31px;
  font-weight: 650;
}
.stat-label {
  color: var(--ops-amber);
  font-size: 11px;
  text-transform: uppercase;
}
.stat-note,
.process-meta,
.paper-meta,
.concept-meta,
.muted {
  color: var(--ops-muted);
}
.process-card {
  background: linear-gradient(105deg, rgba(13, 31, 30, .86), rgba(23, 58, 55, .55));
  border-color: rgba(101,240,223,.2);
}
.process-title,
.concept-name,
.paper-title {
  color: var(--ops-ink);
}
.badge {
  border-radius: 999px;
  border-color: rgba(101,240,223,.22);
  background: rgba(9, 24, 23, .78);

function api(path) {
  return fetch(API + path).then(function(response) {
    if (!response.ok) throw new Error(path + " " + response.status);
    return response.json();
  });
}
function esc(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
  });
}
function jsq(value) {
  return String(value || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/\n/g, " ");

          '<div style="display:flex;align-items:baseline;gap:8px;margin-top:5px"><strong style="color:' + color + ';font-size:24px;font-family:SFMono-Regular,Menlo,monospace">' + esc(String(index + 1).padStart(2, "0")) + '</strong></div>' +
        '</div>' +
      '</foreignObject>' +
    '</g>';
  }).join("");
  var listCards = points.map(function(point, index) {
    var selected = activeId === point.node.id;
    var color = storyColor(point.node.node_type || point.node.status || "");
    var title = labelLines(point.node.title || point.node.type_label || "Node", 34, 2).join(" ");
    return '<g class="trajectory-node" onclick="selectTrajectoryNode(\'' + jsq(point.node.id) + '\')" style="cursor:pointer">' +
      (selected ? '<circle class="trajectory-selected-ring" cx="' + spineX + '" cy="' + point.midY + '" r="24" stroke="' + color + '"></circle>' : '') +
      '<circle cx="' + spineX + '" cy="' + point.midY + '" r="5" fill="' + color + '" stroke="#d8b66f" stroke-width="1"></circle>' +
      '<foreignObject x="' + point.x + '" y="' + point.y + '" width="330" height="74">' +
        '<div xmlns="http://www.w3.org/1999/xhtml" class="trajectory-list-card' + (selected ? " selected" : "") + '">' +
          '<div class="trajectory-label-type">' + esc(point.node.type_label || point.node.node_type || "Node") + '</div>' +
          '<div class="trajectory-label-title">' + esc(title) + '</div>' +
        '</div>' +
      '</foreignObject>' +
    '</g>';
  }).join("");
  container.innerHTML =
    '<svg class="trajectory-svg" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="Trajectory map">' +
      definitions +
      '<rect x="0" y="0" width="' + width + '" height="' + height + '" fill="rgba(3,7,6,.2)"></rect>' +
      '<text x="34" y="42" fill="#8aa09b" font-size="12" letter-spacing="0">Trajectory intelligence</text>' +
      hubNode +
      contextLink +
      rowLinks +
      spineBase +
      activeSpine +
      summaryCards +
      listCards +
    '</svg>';
}
function renderCompactEvolutionMap(container, nodes) {
  var width = 360;
  var rowGap = 88;
  var top = 126;
  var height = top + nodes.length * rowGap + 44;
  var group = activeTrajectoryGroup() || {};
  var activeId = selectedTrajectoryId || (nodes[0] || {}).id || "";
  var activeIndex = Math.max(0, nodes.findIndex(function(node) { return node.id === activeId; }));
  var coverageEvidence = Number(group.evidence_count || (nodes[0] || {}).evidence_count || 0);
  var definitions =
    '<defs>' +
      '<radialGradient id="coreGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#b8a5ff"></stop><stop offset="54%" stop-color="#765fe0"></stop><stop offset="100%" stop-color="#152321"></stop></radialGradient>' +
      '<linearGradient id="compactStroke" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#d8b66f"></stop><stop offset="100%" stop-color="#65f0df"></stop></linearGradient>' +
    '</defs>';
  var hubTitle = labelLines(group.direction || "Research Trajectory", 28, 2).map(function(line, index) {
    return '<text x="76" y="' + (44 + index * 15) + '" text-anchor="middle" fill="#f2f7f5" font-size="12" font-weight="700">' + esc(line) + '</text>';
  }).join("");
  var hub =
    '<g>' +
      '<circle cx="76" cy="84" r="45" fill="rgba(101,240,223,.035)" stroke="rgba(101,240,223,.16)"></circle>' +
      '<circle cx="76" cy="84" r="23" fill="url(#coreGlow)" stroke="rgba(216,182,111,.35)"></circle>' +
      hubTitle +
      '<text x="76" y="142" text-anchor="middle" fill="#8da39e" font-size="10">' + esc(coverageEvidence || nodes.length) + ' evidence</text>' +
    '</g>';
  var rows = nodes.map(function(node, index) {
    var y = top + index * rowGap;
    var selected = activeId === node.id;
    var color = storyColor(node.node_type || node.status || "");
    var title = labelLines(node.title || node.type_label || "Node", 25, 2).join(" ");
    var line = '<path class="trajectory-link' + (selected ? " trajectory-link-active" : "") + '" d="M 108 ' + (y + 32) + ' C 132 ' + (y + 32) + ', 132 ' + (y + 32) + ', 160 ' + (y + 32) + '" stroke="' + (selected ? "url(#compactStroke)" : "rgba(117,163,154,.34)") + '" stroke-width="' + (selected ? "2.2" : "1") + '" fill="none"></path>';
    return line +
      '<g class="trajectory-node" onclick="selectTrajectoryNode(\'' + jsq(node.id) + '\')" style="cursor:pointer">' +
        (selected ? '<circle class="trajectory-selected-ring" cx="154" cy="' + (y + 32) + '" r="24" stroke="' + color + '"></circle>' : '') +
        '<circle cx="154" cy="' + (y + 32) + '" r="5" fill="' + color + '" stroke="#d8b66f" stroke-width="1"></circle>' +
        '<foreignObject x="168" y="' + y + '" width="168" height="74">' +
          '<div xmlns="http://www.w3.org/1999/xhtml" class="trajectory-list-card' + (selected ? " selected" : "") + '">' +
            '<div class="trajectory-label-type">' + esc(node.type_label || node.node_type || "Node") + '</div>' +
            '<div class="trajectory-label-title">' + esc(title) + '</div>' +
          '</div>' +
        '</foreignObject>' +
      '</g>';
  }).join("");
  var activeY = top + activeIndex * rowGap + 32;
  var spine =
    '<path class="trajectory-link trajectory-transition-spine" d="M 108 ' + (top + 32) + ' L 108 ' + (top + (nodes.length - 1) * rowGap + 32) + '" stroke="rgba(117,163,154,.34)" stroke-width="1.2" fill="none"></path>' +
    '<path class="trajectory-link-active trajectory-active-spine" d="M 76 129 C 76 166, 108 176, 108 ' + activeY + '" stroke="url(#compactStroke)" stroke-width="1.7" fill="none"></path>';
  container.innerHTML =
    '<svg class="trajectory-svg trajectory-svg-compact" viewBox="0 0 ' + width + ' ' + height + '" style="min-height:' + height + 'px" role="img" aria-label="Compact trajectory map">' +
      definitions +
      '<rect x="0" y="0" width="' + width + '" height="' + height + '" fill="rgba(3,7,6,.22)"></rect>' +
      '<text x="18" y="24" fill="#8aa09b" font-size="11">Trajectory intelligence</text>' +
      hub +
      spine +
      rows +
    '</svg>';
}
function storyColor(type) {
  var key = String(type || "").toLowerCase();
  if (key.indexOf("question") >= 0) return "#0ea5e9";
  if (key.indexOf("hypothesis") >= 0) return "#d97706";
  if (key.indexOf("turning") >= 0) return "#16a34a";
  if (key.indexOf("shift") >= 0) return "#64748b";
  if (key.indexOf("model") >= 0) return "#7c3aed";
  if (key.indexOf("next") >= 0) return "#dc2626";
  return "#64748b";
}
function labelLines(text, maxChars, maxLines) {
  var words = String(text || "").split(/\s+/);
  var lines = [];
  var line = "";
  words.forEach(function(word) {
    var next = line ? line + " " + word : word;
    if (next.length > maxChars && line) {
      lines.push(line);
      line = word;
    } else {
      line = next;
    }
  });
  if (line) lines.push(line);
  if (lines.length > maxLines) {
    lines = lines.slice(0, maxLines);
    lines[maxLines - 1] = lines[maxLines - 1].replace(/\.*$/, "") + "...";
  }
  return lines;
}
function renderTrajectoryPanel() {
  var group = activeTrajectoryGroup();
  var nodes = group ? (group.nodes || []) : [];
  var selected = nodes.find(function(node) { return node.id === selectedTrajectoryId; }) || nodes[0];
  if (!selected) {
    document.getElementById("trajectory-panel").innerHTML = "";
    return;
  }
  var papers = selected.papers || [];
  var concepts = selected.concepts || [];
  var evidenceCount = Number(selected.evidence_count || 0);
  var evidenceValue = evidenceCount || papers.length || 0;
  var paperCount = Number(selected.paper_count || papers.length || 0);
  var relatedCount = Number(selected.concept_count || concepts.length || (selected.related_trajectories || []).length || 0);
  var evidenceUnit = evidenceValue === 1 ? "evidence point" : "evidence points";
  var stateSummary = selected.summary || ("This node is supported by " + evidenceValue + " " + evidenceUnit + ", " + paperCount + " supporting papers and " + relatedCount + " related signals. Treat this as evidence coverage, not a confidence score.");
  document.getElementById("trajectory-panel").innerHTML =
    '<div class="card trajectory-detail-card">' +
      '<div class="detail-eyebrow">' + esc(selected.type_label || selected.node_type || "Trajectory Node") + '</div>' +
      '<h3 class="detail-title">' + esc(selected.title || "") + '</h3>' +
      '<div class="detail-status"><div><span class="badge badge-green">Active</span><div class="process-meta">Selected from ' + esc((group || {}).direction || "current trajectory") + '</div></div><button class="nav-btn" onclick="openDbPaper(\'' + jsq((papers[0] || {}).doi || "") + '\')">Explore details</button></div>' +
      '<div class="trajectory-state-card"><span class="detail-eyebrow">Evidence State</span><strong>' + esc(evidenceValue) + '</strong><span class="trajectory-state-unit">' + esc(evidenceUnit) + '</span><div class="process-meta">' + esc(stateSummary) + '</div></div>' +
      '<div class="detail-metrics">' +
        '<div class="detail-metric"><strong>' + esc(evidenceValue) + '</strong><span>Evidence points</span></div>' +
        '<div class="detail-metric"><strong>' + esc(paperCount) + '</strong><span>Supporting papers</span></div>' +
        '<div class="detail-metric"><strong>' + esc(relatedCount) + '</strong><span>Related signals</span></div>' +
        '<div class="detail-metric"><strong>' + esc(selected.next_move ? 1 : 0) + '</strong><span>Queued action</span></div>' +
      '</div>' +
      '<div class="analysis-box"><div class="detail-eyebrow">RI Analysis</div><p><strong>Next move</strong></p><p>' + esc(selected.next_move || "Keep this trajectory under watch until more evidence arrives.") + '</p></div>' +
      '<div class="support-list"><div class="detail-eyebrow">Supporting Papers</div>' + (papers.length ? papers.slice(0, 4).map(function(paper) {
        return '<div class="support-paper" onclick="openDbPaper(\'' + jsq(paper.doi) + '\')"><strong>' + esc(paper.title) + '</strong><div class="paper-meta">' + esc(paper.journal || "") + '</div></div>';
      }).join("") : '<div class="support-paper">No supporting papers attached.</div>') + '</div>' +
    '</div>';
}

loadDashboard();
scheduleTrajectoryPrefetch(true);
</script>
